name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxdo-dev libappindicator3-dev
      - name: Build web
        run: cd web && npm install && npm run build
      - name: Build
        run: |
          cargo build --release --workspace
          cargo build --release -p sd-core
      - name: Package
        run: |
          mkdir -p release/plugins
          cp target/release/sd-core release/ || true
          cp target/release/libplugin_*.so release/plugins/ 2>/dev/null || true
          cp -r web/dist release/web
          cd release && tar czf ../streamdeck-linux-x64.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: streamdeck-linux-x64
          path: streamdeck-linux-x64.tar.gz

  build-linux-arm64:
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install cross-compilation tools
        run: |
          sudo dpkg --add-architecture arm64
          if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
            sudo sed -i '/^Types: deb$/a Architectures: amd64' /etc/apt/sources.list.d/ubuntu.sources
          elif [ -f /etc/apt/sources.list ]; then
            sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list
          fi
          printf '%s\n' \
            "Types: deb" \
            "Architectures: arm64" \
            "URIs: http://ports.ubuntu.com/ubuntu-ports" \
            "Suites: noble noble-updates noble-backports noble-security" \
            "Components: main restricted universe multiverse" \
            "Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg" \
            | sudo tee /etc/apt/sources.list.d/arm64-ports.sources > /dev/null
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libgtk-3-dev:arm64 libappindicator3-dev:arm64 libxdo-dev:arm64 libglib2.0-dev:arm64
      - name: Install Rust target
        run: rustup target add aarch64-unknown-linux-gnu
      - name: Build web
        run: cd web && npm install && npm run build
      - name: Build core
        run: |
          PKG_CONFIG_ALLOW_CROSS=1 \
          PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig:$PKG_CONFIG_PATH \
          cargo build --release -p sd-core --target aarch64-unknown-linux-gnu
      - name: Build plugins
        run: |
          PKG_CONFIG_ALLOW_CROSS=1 \
          PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig:$PKG_CONFIG_PATH \
          cargo build --release -p plugin-timer --target aarch64-unknown-linux-gnu
          PKG_CONFIG_ALLOW_CROSS=1 \
          PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig:$PKG_CONFIG_PATH \
          cargo build --release -p plugin-key-simulator --target aarch64-unknown-linux-gnu
          PKG_CONFIG_ALLOW_CROSS=1 \
          PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig:$PKG_CONFIG_PATH \
          cargo build --release -p plugin-volume-master --target aarch64-unknown-linux-gnu
          PKG_CONFIG_ALLOW_CROSS=1 \
          PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig:$PKG_CONFIG_PATH \
          cargo build --release -p plugin-system-monitor --target aarch64-unknown-linux-gnu
          PKG_CONFIG_ALLOW_CROSS=1 \
          PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig:$PKG_CONFIG_PATH \
          cargo build --release -p plugin-obs --target aarch64-unknown-linux-gnu
      - name: Package
        run: |
          mkdir -p release/plugins
          cp target/aarch64-unknown-linux-gnu/release/sd-core release/ 2>/dev/null || true
          cp target/aarch64-unknown-linux-gnu/release/libplugin_*.so release/plugins/ 2>/dev/null || true
          cp -r web/dist release/web
          cd release && tar czf ../streamdeck-linux-arm64.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: streamdeck-linux-arm64
          path: streamdeck-linux-arm64.tar.gz

  build-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build web
        run: cd web && npm install && npm run build
      - name: Build
        run: |
          cargo build --release --workspace
          cargo build --release -p sd-core
      - name: Package
        run: |
          mkdir release\plugins -Force
          copy target\release\sd-core.exe release\ -Force
          copy target\release\plugin_*.dll release\plugins\ -Force
          xcopy web\dist release\web /E /I
          Set-Location release; 7z a ..\streamdeck-windows-x64.zip .
        shell: powershell
      - uses: actions/upload-artifact@v4
        with:
          name: streamdeck-windows-x64
          path: streamdeck-windows-x64.zip

  build-windows-arm64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Rust target
        run: rustup target add aarch64-pc-windows-msvc
      - name: Build web
        run: cd web && npm install && npm run build
      - name: Build core
        run: cargo build --release -p sd-core --target aarch64-pc-windows-msvc
      - name: Build plugins
        run: |
          cargo build --release -p plugin-timer --target aarch64-pc-windows-msvc
          cargo build --release -p plugin-key-simulator --target aarch64-pc-windows-msvc
          cargo build --release -p plugin-volume-master --target aarch64-pc-windows-msvc
          cargo build --release -p plugin-system-monitor --target aarch64-pc-windows-msvc
          cargo build --release -p plugin-obs --target aarch64-pc-windows-msvc
      - name: Package
        run: |
          mkdir release\plugins -Force
          copy target\aarch64-pc-windows-msvc\release\sd-core.exe release\ -Force
          copy target\aarch64-pc-windows-msvc\release\plugin_*.dll release\plugins\ -Force
          xcopy web\dist release\web /E /I
          Set-Location release; 7z a ..\streamdeck-windows-arm64.zip .
        shell: powershell
      - uses: actions/upload-artifact@v4
        with:
          name: streamdeck-windows-arm64
          path: streamdeck-windows-arm64.zip

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build web
        run: cd web && npm install && npm run build
      - name: Build
        run: |
          cargo build --release --workspace
          cargo build --release -p sd-core
      - name: Package
        run: |
          mkdir -p release/plugins
          cp target/release/sd-core release/ 2>/dev/null || true
          cp target/release/libplugin_*.dylib release/plugins/ 2>/dev/null || true
          cp -r web/dist release/web
          cd release && tar czf ../streamdeck-macos-arm64.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: streamdeck-macos-arm64
          path: streamdeck-macos-arm64.tar.gz

  release:
    needs:
      - build-linux-x64
      - build-linux-arm64
      - build-windows-x64
      - build-windows-arm64
      - build-macos-arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            streamdeck-linux-x64/streamdeck-linux-x64.tar.gz
            streamdeck-linux-arm64/streamdeck-linux-arm64.tar.gz
            streamdeck-windows-x64/streamdeck-windows-x64.zip
            streamdeck-windows-arm64/streamdeck-windows-arm64.zip
            streamdeck-macos-arm64/streamdeck-macos-arm64.tar.gz
          generate_release_notes: true
