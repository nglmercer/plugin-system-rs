name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxdo-dev libappindicator3-dev
      - name: Build web
        run: cd web && npm ci && npm run build
      - name: Check Rust
        run: cargo check --workspace
      - name: Run tests
        run: cargo test --workspace

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxdo-dev libappindicator3-dev
      - name: Build web
        run: cd web && npm ci && npm run build
      - name: Build
        run: cargo build --release --workspace
      - name: Verify plugins
        run: |
          ls target/release/libplugin_*.so 2>/dev/null || \
          ls target/release/plugin_*.dll 2>/dev/null || \
          ls target/release/libplugin_*.dylib 2>/dev/null || \
          echo "No plugins found"
