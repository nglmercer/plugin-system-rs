name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxdo-dev libappindicator3-dev libpulse-dev
      - name: Build web
        run: cd web && npm install && npm run build
      - name: Check Rust
        run: cargo check --workspace
      - name: Build plugins for tests
        run: cargo build -p plugin-timer
      - name: Run tests
        run: cargo test --workspace

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxdo-dev libappindicator3-dev libpulse-dev
      - name: Build web
        run: cd web && npm install && npm run build
      - name: Build
        run: cargo build --release --workspace
      - name: List built artifacts
        if: runner.os == 'Linux'
        run: ls -la target/release/libplugin_*.so target/release/sd-core 2>/dev/null || echo "No artifacts"
      - name: List built artifacts
        if: runner.os == 'Windows'
        run: dir target\release\sd-core.exe target\release\plugin_*.dll 2>nul || echo "No artifacts"
        shell: cmd
      - name: List built artifacts
        if: runner.os == 'macOS'
        run: ls -la target/release/libplugin_*.dylib target/release/sd-core 2>/dev/null || echo "No artifacts"
